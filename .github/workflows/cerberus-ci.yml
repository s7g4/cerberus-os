name: Cerberus-OS CI

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2024-11-01
          targets: riscv32imac-unknown-none-elf
          components: clippy, rustfmt
      - run: cargo fmt --check
      - run: cargo clippy --target riscv32imac-unknown-none-elf -- -D warnings

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2024-11-01
          targets: riscv32imac-unknown-none-elf
          components: llvm-tools-preview

      - name: Add LLVM tools to PATH
        run: |
          SYSROOT=$(rustc --print sysroot)
          HOST=$(rustc -vV | grep host | awk '{print $2}')
          echo "$SYSROOT/lib/rustlib/$HOST/bin" >> $GITHUB_PATH

      - name: Compile Kernel
        run: cargo build --release --target riscv32imac-unknown-none-elf

      # Enforce binary size budget (32KB for kernel)
      - name: Enforce binary size budget
        run: |
          SIZE=$(llvm-size target/riscv32imac-unknown-none-elf/release/cerberus-os -A | awk '$1 == ".text" {print $2}')
          echo "Binary .text = ${SIZE} bytes"
          [ "$SIZE" -le "32768" ] || { echo "FAIL: ${SIZE} > 32768"; exit 1; }

      # Verify zero heap allocations
      - name: Verify zero heap allocations
        run: |
          ALLOC=$(llvm-nm target/riscv32imac-unknown-none-elf/release/cerberus-os | grep -c '__rust_alloc' || true)
          echo "Allocator symbols found: $ALLOC"
          [ "$ALLOC" -eq "0" ] || { echo "FAIL: heap allocator linked in"; exit 1; }

      # Verify zero FPU instructions
      - name: Verify zero FPU instructions
        run: |
          FPU=$(llvm-objdump target/riscv32imac-unknown-none-elf/release/cerberus-os -d | grep -cE 'fadd|fmul|fdiv|fsub' || true)
          echo "FPU instructions: $FPU"
          [ "$FPU" -eq "0" ] || { echo "FAIL: FPU instructions emitted"; exit 1; }
